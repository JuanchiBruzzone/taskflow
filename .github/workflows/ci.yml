name: CI — TaskFlow

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  pre:
    name: 🚦 PRE
    runs-on: ubuntu-latest
    steps:
      - run: echo "Starting CI pipeline"

  lint:
    name: 🔍 Lint & Type Check
    runs-on: ubuntu-latest
    needs: pre
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - run: npm run lint

      - name: Type check
        run: npx tsc --noEmit --project apps/api/tsconfig.json

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: pre
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - name: Run unit tests with coverage
        run: npm run test:unit
        working-directory: apps/api

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          directory: apps/api/coverage
          flags: unit

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: pre

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: taskflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://taskflow:testpassword@localhost:5432/taskflow_test
      JWT_SECRET: test-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - name: Run integration tests
        run: npm run test:integration
        working-directory: apps/api

  bdd-tests:
    name: 🥒 BDD / Cucumber Tests
    runs-on: ubuntu-latest
    needs: pre

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: taskflow_bdd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://taskflow:testpassword@localhost:5432/taskflow_bdd
      JWT_SECRET: test-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - name: Run Prisma migrations
        run: npx prisma migrate deploy --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - name: Run BDD scenarios
        run: npm run test:bdd
        working-directory: apps/api

  e2e-tests:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: pre
    if: github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: taskflow_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://taskflow:testpassword@localhost:5432/taskflow_e2e
      JWT_SECRET: test-secret-for-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - run: npx playwright install --with-deps chromium webkit

      - name: Run Prisma migrations + seed
        run: |
          npx prisma migrate deploy --schema=src/prisma/schema.prisma
          npx prisma db seed --schema=src/prisma/schema.prisma
        working-directory: apps/api

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          BASE_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  post:
    name: ✅ POST
    runs-on: ubuntu-latest
    if: always()
    needs:
      - lint
      - unit-tests
      - integration-tests
      - bdd-tests
      - e2e-tests
    steps:
      - name: Check upstream job results
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          INTEGRATION_RESULT: ${{ needs.integration-tests.result }}
          BDD_RESULT: ${{ needs.bdd-tests.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
        run: |
          echo "lint=$LINT_RESULT"
          echo "unit=$UNIT_RESULT"
          echo "integration=$INTEGRATION_RESULT"
          echo "bdd=$BDD_RESULT"
          echo "e2e=$E2E_RESULT"

          for result in "$LINT_RESULT" "$UNIT_RESULT" "$INTEGRATION_RESULT" "$BDD_RESULT"; do
            if [ "$result" != "success" ]; then
              echo "A required CI job failed."
              exit 1
            fi
          done

          if [ "$E2E_RESULT" != "success" ] && [ "$E2E_RESULT" != "skipped" ]; then
            echo "E2E job failed."
            exit 1
          fi

          echo "All required CI jobs completed successfully."

permissions: {}

defaults:
  run:
    shell: bash

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true
